<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaindex</title>

    <link rel="shortcut icon" href="assets/imgs/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/nav.css">
    <link rel="stylesheet" href="assets/css/carrosel.css">
    <link rel="stylesheet" href="assets/css/aside.css">
    <link rel="stylesheet" href="assets/css/content.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/global.css">

</head>

<body>
    <nav class="navbar">
        <header class="logo">
            <h1>
                Zaindex
            </h1>
        </header>
        <ul class="links">
            <li><button class="btnLinks" data-link="index" onclick="sendLink('index')"><i
                        class="fa-solid fa-house"></i>Home</button></li>
            <li><button class="btnLinks" data-link="anime" onclick="sendLink('anime')"><i
                        class="fa-solid fa-tv"></i>Animes</button></li>
            <li><button class="btnLinks" data-link="manga" onclick="sendLink('manga')"><i
                        class="fa-solid fa-book"></i>Mangas</button></li>
        </ul>
        <div class="perfil">
            <button><i class="fa-solid fa-circle-user"></i></button>
        </div>
    </nav>

    <section class="carrosel">

        <img id="img-placeholder" src="" alt="">

        <div class="overlay"></div>

        <div id="infos-placeholder">
            <h1 id="txt-placeholder">Carregando...</h1>

            <button id="btn-placeholder">
                <i class="fa-solid fa-play"></i>
                Veja mais
            </button>
        </div>

        <div class="carousel-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <main id="main">
        <aside>
            <div class="searchbar">
                <h3>Pesquisa e Filtros:</h3>
                <form onsubmit="makeSearch(event)" id="form-pesquisa">
                    <input type="text" name="pesquisa" id="pesquisa" placeholder="Pesquise aqui...">
                    <button type="button" id="limpar-pesquisa" onclick="clearSearch()"><i
                            class="fa-solid fa-x"></i></button>
                    <button type="submit" id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </form>
                <button onclick="refreshApp()" id="refresh-btn"><i class="fa-solid fa-arrows-rotate"></i></button>
            </div>
            <div class="filtros">
                <div id="filtros-placeholder">

                </div>
                <div>
                    <button id="btn-mostrar" onclick="showMore()">Mostrar mais</button>
                </div>
            </div>
        </aside>

        <section class="main-content">

            <div class="content-search">
                <header>
                    <h2 id="titulo-pesquisa"></h2>
                </header>
                <div id="pesquisa-placeholder" class="wrap">

                </div>
            </div>

            <!-- Os melhores -->
            <div class="content">
                <header>
                    <h2 id="titulo"><i class="fa-solid fa-crown"></i> Os melhores 25:</h2>
                </header>
                <div id="melhores-placeholder">

                </div>
            </div>
            
            <!-- Animes da temporada -->
            <div class="content">
                <header>
                    <h2><i class="fa-solid fa-alarm-clock"></i> Animes da Temporada:</h2>
                </header>
                <div id="temporada-placeholder">

                </div>
            </div>
        </section>
    </main>

    <script src="assets/js/index.js" defer></script>
    <script src="assets/js/api.js" defer></script>
    <script src="assets/js/content.js" defer></script>
    <script src="assets/js/components.js" defer></script>
    <script src="assets/js/utils.js" defer></script>
</body>

</html>
